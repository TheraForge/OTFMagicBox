# Profile details / "Manage Profile" configuration
# ------------------------------------------------
# This file controls the UI text for the screen where users edit their profile details
# (name, birthdate, gender, photo, etc.).
# You can safely change the text values without touching the app code.
#
# FORMAT
# - All strings are localized. Every text key contains language codes:
#   'en' for English, 'pt' for Portuguese. You may add more languages (e.g., 'es', 'fr').
# - Keep the structure flat (no deep nesting) to make it easy to edit.
#
# IMPORTANT
# - Do not remove required keys; if you don’t need a language, keep at least one (e.g., 'en').
# - Values on the right of the colon are the visible text in the app.
# - Lines starting with '#' are comments and ignored by the app.
#
# Version of this YAML schema/content. Bump when you change copy/structure.
version: "2.0.0"

# Navigation bar title on the profile details screen.
navTitle:
  en: "Manage Profile"
  pt: "Gerenciar Perfil"
  ar: "إدارة الملف الشخصي"

# Section title shown above the personal information fields.
personalInfoTitle:
  en: "Personal Information"
  pt: "Informação Pessoal"
  ar: "المعلومات الشخصية"

# Field labels for editable profile properties.
firstNameLabel:
  en: "First Name"
  pt: "Nome"
  ar: "الاسم الأول"

lastNameLabel:
  en: "Last Name"
  pt: "Apelido"
  ar: "اسم العائلة"

birthdateLabel:
  en: "Birthdate"
  pt: "Data de Nascimento"
  ar: "تاريخ الميلاد"

genderLabel:
  en: "Gender"
  pt: "Género"
  ar: "الجنس"

# Fallback text shown when a field value has not been set.
notSetText:
  en: "Not set"
  pt: "Não definido"
  ar: "غير محدد"

# Photo editing strings used in the photo action sheet / dialog.
editPhotoTitle:
  en: "Edit Photo"
  pt: "Editar Foto"
  ar: "تعديل الصورة"

# Title for the dialog that lets the user change their profile photo.
changePhotoDialogTitle:
  en: "Change Photo"
  pt: "Mudar Foto"
  ar: "تغيير الصورة"

# Action to pick a new photo from the device's photo library.
chooseFromPhotosTitle:
  en: "Choose from Photos"
  pt: "Escolher das Fotografias"
  ar: "اختيار من الصور"

# Action to remove the existing profile photo.
removePhotoTitle:
  en: "Remove Photo"
  pt: "Remover Foto"
  ar: "إزالة الصورة"

# Generic cancel action title used in dialogs/action sheets.
cancelTitle:
  en: "Cancel"
  pt: "Cancelar"
  ar: "إلغاء"
