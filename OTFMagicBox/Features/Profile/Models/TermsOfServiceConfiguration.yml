    - **Consulte um Profissional:** Procure sempre o conselho do seu médico ou outro profissional de saúde qualificado com quaisquer questões que possa ter sobre uma condição médica.
    - **Emergências:** Se pensa que pode ter uma emergência médica, ligue imediatamente para o seu médico ou para os serviços de emergência.

