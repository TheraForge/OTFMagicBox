  ar: |
    **آخر تحديث:** يناير 2026

    **1. الموافقة على الشروط**
    
    تشكل شروط الخدمة هذه (المشار إليها بـ "الشروط") اتفاقية ملزمة قانونًا بينك وبين شركة **Hippocrates Technologies Sagl** ("نحن" أو "نا" أو "الخاصة بنا")، فيما يتعلق بوصولك إلى تطبيق الهاتف المحمول **MagicBox** واستخدامه ("التطبيق").
    
    **من خلال الوصول إلى التطبيق، فإنك تقر بأنك قرأت وفهمت وتوافق على الالتزام بجميع هذه الشروط.**

    **2. إخلاء مسؤولية طبية**
    
    **هام:** التطبيق مخصص **لأغراض إعلامية وتعليمية فقط**.
    - **ليس نصيحة طبية:** لا يقدم التطبيق نصيحة طبية أو تشخيصًا أو علاجًا. الوصول إلى هذا التطبيق لا ينشئ علاقة بين الطبيب والمريض.
    - **استشر متخصصًا:** اطلب دائمًا المشورة من طبيبك أو غيره من مقدمي الخدمات الصحية المؤهلين بشأن أي أسئلة قد تكون لديك بخصوص حالة طبية.
    - **حالات الطوارئ:** إذا كنت تعتقد أنك قد تواجه حالة طبية طارئة، فاتصل بطبيبك أو بخدمات الطوارئ على الفور.

    **3. مسؤوليات الحساب**
    
    لاستخدام ميزات معينة في التطبيق، قد يُطلب منك إنشاء حساب. أنت توافق على:
    - الحفاظ على سرية كلمة المرور ومعلومات حسابك.
    - أن تكون مسؤولاً عن جميع استخدامات حسابك وكلمة المرور الخاصة بك.
    - إخطارنا فوراً بأي استخدام غير مصرح به لحسابك.
    
    نمنحك ترخيصًا محدودًا وغير حصري وغير قابل للتحويل وقابل للإلغاء لاستخدام التطبيق لأغراض شخصية وغير تجارية.

    **4. حقوق الملكية الفكرية**
    
    ما لم يذكر خلاف ذلك، فإن التطبيق هو ملكية خاصة بنا وجميع أكواد المصدر وقواعد البيانات والوظائف والبرامج وتصميمات مواقع الويب والصوت والفيديو والنصوص والصور والرسومات الموجودة في التطبيق (يشار إليها مجتمعة باسم "المحتوى") مملوكة لنا أو مرخصة لنا، وهي محمية بقوانين حقوق النشر والعلامات التجارية.

    **5. تعهدات المستخدم**
    
    باستخدامك للتطبيق، فإنك تتعهد وتضمن ما يلي:
    1.  أن جميع معلومات التسجيل التي تقدمها حقيقية ودقيقة وحالية وكاملة.
    2.  أن لديك الأهلية القانونية وتوافق على الامتثال لهذه الشروط.
    3.  أنك لن تصل إلى التطبيق من خلال وسائل آلية أو غير بشرية (روبوتات، نصوص برمجية).
    4.  أنك لن تستخدم التطبيق لأي غرض غير قانوني أو غير مصرح به.

    **6. الأنشطة المحظورة**
    
    لا يجوز لك الوصول إلى التطبيق أو استخدامه لأي غرض آخر غير الغرض الذي نوفره من أجله. أنت توافق على عدم:
    - محاولة انتحال شخصية مستخدم أو شخص آخر.
    - بيع أو نقل ملفك الشخصي بأي طريقة أخرى.
    - استخدام أي معلومات تم الحصول عليها من التطبيق لمضايقة أو إساءة معاملة أو إيذاء شخص آخر.
    - التدخل في التطبيق أو الشبكات أو الخدمات المتصلة بالتطبيق أو تعطيلها أو خلق عبء غير مبرر عليها.

    **7. إنهاء الخدمة**
    
    يجوز لنا إنهاء أو تعليق حسابك ومنع الوصول إلى الخدمة على الفور، دون إشعار مسبق أو مسؤولية، وفقًا لتقديرنا المطلق، لأي سبب من الأسباب، بما في ذلك على سبيل المثال لا الحصر خرق الشروط. إذا كنت ترغب في إنهاء حسابك، يمكنك ببساطة التوقف عن استخدام الخدمة أو حذف حسابك داخل التطبيق.

    **8. تحديد المسؤولية**
    
    بأي حال من الأحوال لن نكون نحن أو مديرينا أو موظفينا أو وكلائنا مسؤولين تجاهك أو تجاه أي طرف ثالث عن أي أضرار مباشرة أو غير مباشرة أو تبعية أو تحذيرية أو عرضية أو خاصة أو عقابية، بما في ذلك خسارة الأرباح أو فقدان الإيرادات أو فقدان البيانات، الناشئة عن استخدامك للتطبيق، حتى لو تم إخطارنا بإمكانية حدوث مثل هذه الأضرار.

    **9. التعويض**
    
    أنت توافق على الدفاع عنا وتعويضنا وحمايتنا من أي ضرر، بما في ذلك الشركات التابعة لنا والمسؤولين والوكلاء والشركاء والموظفين، من وضد أي خسارة أو ضرر أو مسؤولية أو مطالبة، بما في ذلك أتعاب المحاماة المعقولة، التي يقدمها أي طرف ثالث نتيجة لـ: (1) استخدامك للتطبيق؛ (2) خرق هذه الشروط؛ أو (3) أي خرق لتعهداتك وضماناتك المذكورة في هذه الشروط.

    **10. القانون الواجب التطبيق**
    
    تخضع هذه الشروط وتُفسر وفقًا لقوانين **سويسرا**. توافق أنت وشركة Hippocrates Technologies Sagl بشكل لا رجعة فيه على أن محاكم سويسرا سيكون لها الاختصاص القضائي الحصري لحل أي نزاع قد ينشأ بخصوص هذه الشروط.

    **11. التغييرات في الشروط**
    
    نحتفظ بالحق، وفقًا لتقديرنا المطلق، في تعديل أو استبدال هذه الشروط في أي وقت. إذا كان التعديل جوهريًا، فسنقدم إشعارًا قبل 30 يومًا على الأقل من بدء سريان أي شروط جديدة. سيتم تحديد ما يشكل تغييرًا جوهريًا وفقًا لتقديرنا الخاص.

    **12. اتصل بنا**
    
    لحل شكوى بخصوص التطبيق أو للحصول على مزيد من المعلومات فيما يتعلق باستخدامه، يرجى الاتصال بنا على:
    **البريد الإلكتروني:** support@hippocratestech.com
