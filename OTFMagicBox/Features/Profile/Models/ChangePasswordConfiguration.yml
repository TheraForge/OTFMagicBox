# Change Password feature configuration
# ------------------------------------
# This file controls the UI text for the "Change Password" screen.
# You can safely change the text values without touching the app code.
#
# FORMAT
# - All strings are localized. Every text key contains language codes:
#   'en' for English, 'pt' for Portuguese. You may add more languages (e.g., 'es', 'fr').
# - Keep the structure flat (no deep nesting) to make it easy to edit.
#
# IMPORTANT
# - Do not remove required keys; if you don’t need a language, keep at least one (e.g., 'en').
# - Values on the right of the colon are the visible text in the app.
# - Lines starting with '#' are comments and ignored by the app.
#
# Version of this YAML schema/content. Bump when you change copy/structure.
version: "2.0.0"

# Navigation bar title on the "Change Password" screen.
navTitle:
  en: "Change Password"
  pt: "Alterar Palavra-passe"
  ar: "تغيير كلمة المرور"

# Static label showing the user's email.
emailLabel:
  en: "Email"
  pt: "Email"
  ar: "البريد الإلكتروني"

# Section header shown above the password fields.
sectionTitle:
  en: "Change Password"
  pt: "Alterar Palavra-passe"
  ar: "تغيير كلمة المرور"

# Placeholders for the current and new password text fields.
oldPasswordPlaceholder:
  en: "Old Password"
  pt: "Palavra-passe Antiga"
  ar: "كلمة المرور القديمة"

newPasswordPlaceholder:
  en: "New Password"
  pt: "Nova Palavra-passe"
  ar: "كلمة المرور الجديدة"

# Primary and secondary actions.
resetButtonTitle:
  en: "Reset Password"
  pt: "Repor Palavra-passe"
  ar: "إعادة تعيين كلمة المرور"

cancelButtonTitle:
  en: "Cancel"
  pt: "Cancelar"
  ar: "إلغاء"

# Error alert title shown when the password reset fails.
failureAlertTitle:
  en: "Password Reset Error!"
  pt: "Erro ao repor palavra-passe!"
  ar: "خطأ في إعادة تعيين كلمة المرور!"

# Default confirmation action title for alerts.
okayActionTitle:
  en: "OK"
  pt: "OK"
  ar: "موافق"
