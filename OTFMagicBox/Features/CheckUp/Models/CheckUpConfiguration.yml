# Check Up feature configuration
# ------------------------------
# Controls UI text and a few preferences for the Check Up screen.
# - Keep the structure flat (easy to edit).
# - All user-visible strings are localized (en/pt shown; add more if needed).
#
# Version of this YAML schema/content. Bump when you change copy/structure.
version: "2.0.0"

# Navigation + section
navigationTitle:
  en: "Check-Up"
  pt: "Check-up"
  ar: "الفحص"
sectionHeaderTitle:
  en: "Today’s Overview"
  pt: "Resumo de hoje"
  ar: "ملخص اليوم"

# Account deleted alert
alertAccountDeletedTitle:
  en: "Account Deleted"
  pt: "Conta eliminada"
  ar: "تم حذف الحساب"
alertAccountDeletedMessage:
  en: "Your account was removed from this device."
  pt: "A sua conta foi removida deste dispositivo."
  ar: "تمت إزالة حسابك من هذا الجهاز."
alertOkButtonTitle:
  en: "OK"
  pt: "OK"
  ar: "موافق"

# Row: Activities (count based)
rowActivitiesTitle:
  en: "Physical Activities"
  pt: "Atividades físicas"
  ar: "الأنشطة البدنية"
rowActivitiesColor: "blue"
rowActivitiesLineWidth: 4.0

# Row: Medications (percent based)
rowMedicationsTitle:
  en: "Medications Taken"
  pt: "Medicação tomada"
  ar: "الأدوية المتناولة"
rowMedicationsColor: "green"
rowMedicationsLineWidth: 4.0

# Row: Checkups (percent based)
rowCheckupsTitle:
  en: "Checkups"
  pt: "Revisões"
  ar: "الفحوصات"
rowCheckupsColor: "green"
rowCheckupsLineWidth: 4.0

# Row: Appointments (count based)
rowAppointmentsTitle:
  en: "Appointments"
  pt: "Consultas"
  ar: "المواعيد"
rowAppointmentsColor: "green"
rowAppointmentsLineWidth: 4.0
