# Health permissions
# HealthKit permissions copy and configuration.
# Title shown when requesting health permissions.
healthPermissionsTitle:
  en: "Permission to read activity data"
  pt: "Permissão para ler dados de atividade"
  ar: "إذن لقراءة بيانات النشاط"
# Description shown when requesting health permissions.
healthPermissionsText:
  en: "Use this text to provide an explanation to your app participants about what activity data you intend to read from the Health app and why. This sample will read step count, distance, heart rate, and flights climbed data."
  pt: "Use este texto para explicar aos participantes do seu aplicativo quais dados de atividade você pretende ler do aplicativo Saúde e por quê. Este exemplo lerá dados de contagem de passos, distância, frequência cardíaca e lances de escada."
  ar: "استخدم هذا النص لشرح لمستخدمي تطبيقك بيانات النشاط التي تنوي قراءتها من تطبيق الصحة ولماذا. سيقرأ هذا المثال بيانات عدد الخطوات والمسافة ومعدل ضربات القلب وعدد الطوابق التي تم صعودها."
# Background read frequency for health data (e.g., 'immediate', 'hourly', 'daily').
healthBackgroundReadFrequency: "immediate"
# Health data types to request (e.g., 'stepCount', 'distanceWalkingRunning').
healthTypes:
  - "StepCount"
  - "DistanceWalkingRunning"
  - "FlightsClimbed"

