# Auth configuration
# ------------------
# This file controls the authentication and onboarding-related copy, options,
# and feature flags across the app's sign-up/sign-in flows.
# You can safely change the text values without touching the app code.
# Format:
#   - Localized strings are grouped by key with language codes (e.g., 'en', 'pt').
#   - You may add more languages by adding more codes (e.g., 'es', 'fr') with translations.
#   - Keep the structure flat (no deep nesting) to make it easy to edit.
#
# IMPORTANT
# - Do not remove required keys; if you don’t need a language, leave at least one (e.g., 'en').
# - Values on the right of the colon are the visible text in the app.
# - Lines starting with '#' are comments and are ignored by the app.

# Version of this YAML schema/content. Bump when you change copy/structure.
version: "2.0.0"

# Consent
# Consent configuration for the study/terms screen.
# Name of the consent resource/file (without extension if applicable).
consentFileName: "TheraForgeConsent"
# Localized reason statement shown to the user for consent.
consentReason:
  en: "I consent to participate in the study."
  pt: "Eu concordo em participar no estudo."
  ar: "أوافق على المشاركة في الدراسة."

# Consent
consentFileName: "TheraForgeConsent"

# Update this to fit login-time consent
consentReason:
  en: "I agree to the Terms of Use and acknowledge the Privacy Policy."
  pt: "Concordo com os Termos de Utilização e reconheço a Política de Privacidade."
  ar: "أوافق على شروط الاستخدام وأقرّ بسياسة الخصوصية."

# Title for the consent document
consentTitle:
  en: "Terms & Privacy Agreement"
  pt: "Acordo de Termos e Privacidade"
  ar: "اتفاقية الشروط والخصوصية"

# Ordered sections; toggle with `show`
consentSections:
  - type: "overview"
    show: true
    title:
      en: "Before You Continue"
      pt: "Antes de Continuar"
      ar: "قبل المتابعة"
    summary:
      en: "Review how we handle your data and agree to our terms."
      pt: "Revise como tratamos os seus dados e aceite os nossos termos."
      ar: "راجع كيف نتعامل مع بياناتك ووافق على شروطنا."
    content:
      en: "By continuing, you confirm you meet the minimum age, agree to the Terms of Use, and acknowledge the Privacy Policy. You can manage your choices in Settings at any time."
      pt: "Ao continuar, confirma que cumpre a idade mínima, concorda com os Termos de Utilização e reconhece a Política de Privacidade. Pode gerir as suas escolhas nas Definições a qualquer momento."
      ar: "بمتابعتك، تؤكد أنك تستوفي الحد الأدنى للعمر، وتوافق على شروط الاستخدام، وتقرّ بسياسة الخصوصية. يمكنك إدارة اختياراتك من الإعدادات في أي وقت."
    image:

  - type: "dataGathering"
    show: true
    title:
      en: "Data We Collect"
      pt: "Dados que Recolhemos"
      ar: "البيانات التي نجمعها"
    summary:
      en: "Account info, app usage, diagnostics, and optional health data."
      pt: "Informações de conta, utilização da app, diagnósticos e dados de saúde opcionais."
      ar: "معلومات الحساب، واستخدام التطبيق، وبيانات التشخيص، وبيانات صحية اختيارية."
    content:
      en: "We collect your account details (e.g., email), device identifiers, crash/diagnostic data, and app usage analytics. With your permission, we may read Health data to power app features. We do not record audio or track precise location."
      pt: "Recolhemos dados da sua conta (ex.: email), identificadores do dispositivo, dados de falhas/diagnóstico e análises de utilização. Com a sua permissão, podemos ler dados de Saúde para funcionalidades da app. Não gravamos áudio nem rastreamos a localização precisa."
      ar: "نجمع تفاصيل حسابك (مثل البريد الإلكتروني)، ومعرّفات الجهاز، وبيانات الأعطال/التشخيص، وتحليلات استخدام التطبيق. وبموافقتك، قد نقرأ بيانات الصحة لتمكين ميزات التطبيق. نحن لا نسجل الصوت ولا نتتبع الموقع الدقيق."
    image:

  - type: "privacy"
    show: true
    title:
      en: "Your Privacy & Security"
      pt: "A Sua Privacidade e Segurança"
      ar: "خصوصيتك وأمانك"
    summary:
      en: "Encryption in transit and at rest; limited access by authorized staff."
      pt: "Encriptação em trânsito e em repouso; acesso limitado por pessoal autorizado."
      ar: "تشفير أثناء النقل وعند التخزين؛ وصول محدود للموظفين المصرّح لهم."
    content:
      en: "We encrypt data in transit and at rest. Access is restricted to authorized personnel for support and operations. We never sell your personal information."
      pt: "Encriptamos dados em trânsito e em repouso. O acesso é restrito a pessoal autorizado para apoio e operações. Nunca vendemos as suas informações pessoais."
      ar: "نشفّر البيانات أثناء النقل وعند التخزين. يقتصر الوصول على الموظفين المصرّح لهم للدعم والتشغيل. نحن لا نبيع معلوماتك الشخصية أبدًا."
    image:

  - type: "dataUse"
    show: true
    title:
      en: "How We Use Your Data"
      pt: "Como Utilizamos os Seus Dados"
      ar: "كيف نستخدم بياناتك"
    summary:
      en: "To provide the service, improve reliability, and meet legal obligations."
      pt: "Para fornecer o serviço, melhorar a fiabilidade e cumprir obrigações legais."
      ar: "لتقديم الخدمة، وتحسين الموثوقية، والوفاء بالالتزامات القانونية."
    content:
      en: "We use data to deliver core functionality, troubleshoot issues, improve performance, and comply with laws. Aggregated analytics may inform product decisions. Marketing is optional and can be disabled."
      pt: "Utilizamos dados para fornecer funcionalidades essenciais, resolver problemas, melhorar o desempenho e cumprir a lei. Análises agregadas podem informar decisões do produto. Marketing é opcional e pode ser desativado."
      ar: "نستخدم البيانات لتقديم الوظائف الأساسية، وتشخيص المشكلات، وتحسين الأداء، والامتثال للقوانين. قد تُستخدم التحليلات المجمّعة لاتخاذ قرارات المنتج. التسويق اختياري ويمكن تعطيله."
    image:

  - type: "withdrawing"
    show: true
    title:
      en: "Your Choices"
      pt: "As Suas Escolhas"
      ar: "خياراتك"
    summary:
      en: "Manage permissions, download or delete data, or close your account."
      pt: "Gerir permissões, descarregar ou eliminar dados, ou encerrar a conta."
      ar: "إدارة الأذونات، وتنزيل البيانات أو حذفها، أو إغلاق حسابك."
    content:
      en: "You can revoke permissions in Settings, request data export or deletion, and close your account. Some data may be retained where required by law or for fraud prevention."
      pt: "Pode revogar permissões nas Definições, pedir exportação ou eliminação dos dados e encerrar a conta. Alguns dados podem ser retidos quando exigido por lei ou para prevenção de fraude."
      ar: "يمكنك إلغاء الأذونات من الإعدادات، وطلب تصدير البيانات أو حذفها، وإغلاق حسابك. قد نحتفظ ببعض البيانات عندما يقتضي القانون ذلك أو لأغراض منع الاحتيال."
    image:

  - type: "custom"
    show: true
    title:
      en: "Links & Contact"
      pt: "Ligações e Contacto"
      ar: "الروابط والتواصل"
    summary:
      en: "Read the full Terms and Privacy Policy or contact support."
      pt: "Leia os Termos e a Política de Privacidade completos ou contacte o suporte."
      ar: "اقرأ الشروط وسياسة الخصوصية بالكامل أو تواصل مع الدعم."
    content:
      en: "Terms of Use: example.org/terms\nPrivacy Policy: example.org/privacy\nSupport: support@example.org"
      pt: "Termos de Utilização: example.org/terms\nPolítica de Privacidade: example.org/privacy\nApoio: support@example.org"
      ar: "شروط الاستخدام: example.org/terms\nسياسة الخصوصية: example.org/privacy\nالدعم: support@example.org"
    image: "online-agreement"

# Health Records
healthRecords:
