# Logs feature configuration
# --------------------------------
# This file controls the UI text and a few visual preferences for the Logs screen.
# You can safely change the text values without touching the app code.
# Format:
#   - All strings are localized. Inside each key (like featureTitle), there are language
#     codes (e.g., 'en' for English, 'pt' for Portuguese). You may add more languages
#     by adding more codes (e.g., 'es', 'fr') with their translations.
#   - Keep the structure flat (no deep nesting) to make it easy to edit.
#
# IMPORTANT
# - Do not remove required keys; if you don’t need a language, leave at least one (e.g., 'en').
# - Values on the right of the colon are the visible text in the app.
# - Lines starting with '#' are just comments and are ignored by the app.
#
# Version of this YAML schema/content. Bump when you change copy/structure.
version: "2.0.0"

# Title shown at the top of the filter sheet and used as the feature name in various places.
featureTitle:
  en: "Diagnostics"
  pt: "Diagnóstico"
  ar: "التشخيص"

# Navigation bar title on the main Logs screen.
navTitle:
  en: "Logs"
  pt: "Registros"
  ar: "السجلات"

# Title in the empty state when no logs are available for the current filters.
emptyTitle:
  en: "No logs found"
  pt: "Sem registros"
  ar: "لم يتم العثور على سجلات"

# Subtitle/explanation in the empty state to help users get results.
emptySubtitle:
  en: "Try widening the date range or choosing another level."
  pt: "Tente alargar o intervalo de datas ou escolher outro nível."
  ar: "حاول توسيع نطاق التاريخ أو اختيار مستوى آخر."

# Label for the button/icon that opens the filter sheet.
filterLabel:
  en: "Filter"
  pt: "Filtro"
  ar: "تصفية"

# Label above the start date picker in the filter sheet.
startLabel:
  en: "Start"
  pt: "Início"
  ar: "البداية"

# Label above the end date picker in the filter sheet.
endLabel:
  en: "End"
  pt: "Fim"
  ar: "النهاية"

# Label above the log level picker in the filter sheet.
# (Use this with a picker that can choose 'All' or a specific level like Debug, Info, Error.)
levelLabel:
  en: "Level"
  pt: "Nível"
  ar: "المستوى"

# Title of the detail screen when you tap a log entry.
detailTitle:
  en: "Entry"
  pt: "Registo"
  ar: "الإدخال"

# Field labels inside the log detail screen.
# Label for the log date field in the detail screen.
dateLabel:
  en: "Date"
  pt: "Data"
  ar: "التاريخ"

# Label for the log category field in the detail screen.
categoryLabel:
  en: "Category"
  pt: "Categoria"
  ar: "الفئة"

# Label for the log subsystem field in the detail screen.
subsystemLabel:
  en: "Subsystem"
  pt: "Subsistema"
  ar: "النظام الفرعي"

# Search placeholder text shown in the search bar on the list screen.
searchPlaceholder:
  en: "Search message, category or subsystem"
  pt: "Pesquisar mensagem, categoria ou subsistema"
  ar: "ابحث عن الرسالة أو الفئة أو النظام الفرعي"

# Toolbar/action button titles.
# Reloads the list with the current filters.
refreshTitle:
  en: "Refresh"
  pt: "Atualizar"
  ar: "تحديث"

# Exports the current list of logs (e.g., share a file).
exportTitle:
  en: "Export"
  pt: "Exportar"
  ar: "تصدير"

# Copies selected log details to the clipboard.
copyTitle:
  en: "Copy"
  pt: "Copiar"
  ar: "نسخ"

# Visual preferences
# ------------------
# Maximum number of lines to display for each log message in the list.
# Tip: Increase if you want to see more of each message without tapping into details.
rowsMaxLines: 3

# How many days back the initial date range should start from when opening the screen.
# Example: 1 means "from yesterday to now" by default.
defaultDaysBack: 1
