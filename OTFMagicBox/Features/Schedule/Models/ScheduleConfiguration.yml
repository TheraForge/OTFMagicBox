# Schedule feature configuration
# ------------------------------
# Controls UI text and a few preferences for the Schedule screen.
# - Keep the structure flat (easy to edit).
# - All user-visible strings are localized (en/pt shown; add more if needed).
#
# Version of this YAML schema/content. Bump when you change copy/structure.
version: "2.0.0"

# Navigation bar title on the Schedule screen.
navTitle:
  en: "Schedule"
  pt: "Agenda"
  ar: "الجدول"

# Label for the leading toolbar button that jumps to today.
todayLabel:
  en: "Today"
  pt: "Hoje"
  ar: "اليوم"

# If true, the Today button uses "<DAY>.calendar" SF Symbol when available (1.calendar ... 31.calendar),
# otherwise it falls back to "calendar".
useDynamicCalendarSymbol: true

# Show the leading "Today" button on the Schedule screen.
showLeadingTodayButton: true

# Texts for the empty day card (shown when there are no tasks on a given date).
emptyDayTitle:
  en: "No tasks"
  pt: "Sem tarefas"
  ar: "لا توجد مهام"

# Secondary text shown under the empty day title.
emptyDaySubtitle:
  en: "No tasks scheduled for this date."
  pt: "Não há tarefas agendadas para esta data."
  ar: "لا توجد مهام مجدولة لهذا التاريخ."

# Alert shown after the account is deleted (navigates back to onboarding).
deletedAlertTitle:
  en: "Account Deleted"
  pt: "Conta Excluída"
  ar: "تم حذف الحساب"

# Body text for the Account Deleted alert.
deletedAlertMessage:
  en: "Your account was deleted. You'll be returned to onboarding."
  pt: "Sua conta foi excluída. Você será levado ao onboarding."
  ar: "تم حذف حسابك. ستتم إعادتك إلى شاشة الإعداد."
