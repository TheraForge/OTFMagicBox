# Guidance Steps
guidanceHeartRateStep1:
  en: "Make sure your Apple Watch is paired and unlocked."
  pt: "Certifique-se de que seu Apple Watch esteja emparelhado e desbloqueado."
  ar: "تأكد من اقتران Apple Watch وإلغاء قفلها."

guidanceHeartRateStep2:
  en: "Open the Heart Rate app on your Apple Watch."
  pt: "Abra o app Batimentos no seu Apple Watch."
  ar: "افتح تطبيق 'معدل ضربات القلب' على Apple Watch."

guidanceHeartRateStep3:
  en: "Wait for a measurement to complete."
  pt: "Aguarde a conclusão da medição."
  ar: "انتزر حتى يكتمل القياس."

guidanceBloodGlucoseStep1:
  en: "Data is typically added by a connected CGM or manual entry."
  pt: "Dados geralmente são adicionados por um CGM conectado ou entrada manual."
  ar: "تتم إضافة البيانات عادةً بواسطة جهاز مراقبة السكر المتصل أو الإدخال اليدوي."

guidanceBloodGlucoseStep2:
  en: "Open the Health app to manually add a data point."
  pt: "Abra o app Saúde para adicionar um ponto de dados manualmente."
  ar: "افتح تطبيق 'صحتي' لإضافة نقطة بيانات يدويًا."

guidanceBloodGlucoseStep3:
  en: "Or sync with your glucose monitoring device."
  pt: "Ou sincronize com seu dispositivo de monitoramento de glicose."
  ar: "أو قم بالمزامنة مع جهاز مراقبة الجلوكوز الخاص بك."

guidanceBloodPressureStep1:
  en: "Use a connected blood pressure cuff."
  pt: "Use um medidor de pressão arterial conectado."
  ar: "استخدم جهاز قياس ضغط الدم المتصل."

guidanceBloodPressureStep2:
  en: "Or manually enter a reading in the Health app."
  pt: "Ou insira manualmente uma leitura no app Saúde."
  ar: "أو أدخل قراءة يدويًا في تطبيق 'صحتي'."

guidanceBloodPressureStep3:
  en: "Ensure both Systolic and Diastolic values are recorded."
  pt: "Certifique-se de que os valores Sistólico e Diastólico sejam registrados."
  ar: "تأكد من تسجيل القيمتين الانقباضية والانبساطية."

guidanceECGStep1:
  en: "Open the ECG app on your Apple Watch."
  pt: "Abra o app ECG no seu Apple Watch."
  ar: "افتح تطبيق تخطيط القلب على Apple Watch."

guidanceECGStep2:
  en: "Hold your finger on the Digital Crown."
  pt: "Mantenha o dedo na Digital Crown."
  ar: "ضع إصبعك على التاج الرقمي."

guidanceECGStep3:
  en: "Wait 30 seconds for the recording to finish."
  pt: "Aguarde 30 segundos para a gravação terminar."
  ar: "انتظر 30 ثانية حتى ينتهي التسجيل."

guidanceRespiratoryRateStep1:
  en: "Wear your Apple Watch during sleep."
  pt: "Use seu Apple Watch durante o sono."
  ar: "ارتدِ Apple Watch أثناء النوم."

guidanceRespiratoryRateStep2:
  en: "Or use a supported third-party device."
  pt: "Ou use um dispositivo de terceiro compatível."
  ar: "أو استخدم جهازًا مدعومًا من جهة خارجية."

guidanceRespiratoryRateStep3:
  en: "Check 'Respiratory Rate' in the Health app."
  pt: "Verifique 'Frequência Respiratória' no app Saúde."
  ar: "تحقق من 'معدل التنفس' في تطبيق 'صحتي'."

guidanceRestingHeartRateStep1:
  en: "Wear your Apple Watch consistently."
  pt: "Use seu Apple Watch consistentemente."
  ar: "ارتدِ Apple Watch باستمرار."

guidanceRestingHeartRateStep2:
  en: "Resting heart rate is calculated when you differ from active states."
  pt: "A frequência cardíaca em repouso é calculada quando você não está ativo."
  ar: "يتم حساب معدل ضربات القلب أثناء الراحة عندما تكون في حالة سكون."

guidanceRestingHeartRateStep3:
  en: "Check 'Resting Heart Rate' in the Health app."
  pt: "Verifique 'Freq. Cardíaca em Repouso' no app Saúde."
  ar: "تحقق من 'معدل ضربات القلب أثناء الراحة' في تطبيق 'صحتي'."

guidanceOxygenSaturationStep1:
  en: "Open the Blood Oxygen app on your Apple Watch."
  pt: "Abra o app Oxigênio no Sangue no Apple Watch."
  ar: "افتح تطبيق أكسجين الدم على Apple Watch."

guidanceOxygenSaturationStep2:
  en: "Keep your wrist still during the 15-second measurement."
  pt: "Mantenha o pulso imóvel durante a medição de 15 segundos."
  ar: "أبقِ معصمك ثابتًا أثناء القياس لمدة 15 ثانية."

guidanceOxygenSaturationStep3:
  en: "Ensure the band is snug but comfortable."
  pt: "Garanta que a pulseira esteja justa, mas confortável."
  ar: "تأكد من أن السوار محكم ولكنه مريح."

guidanceVO2MaxStep1:
  en: "Record an Outdoor Walk, Run, or Hiking workout."
  pt: "Registre um treino de Caminhada, Corrida ou Trilha ao Ar Livre."
  ar: "سجّل تمرينًا للمشي أو الجري أو التنزه في الخارج."

guidanceVO2MaxStep2:
  en: "Sustain efforts for at least 20 minutes."
  pt: "Mantenha o esforço por pelo menos 20 minutos."
  ar: "حافظ على الجهد لمدة 20 دقيقة على الأقل."

guidanceVO2MaxStep3:
  en: "Check 'Cardio Fitness' in the Health app."
  pt: "Verifique 'Aptidão Cardiorrespiratória' no app Saúde."
  ar: "تحقق من 'لياقة القلب والأوعية الدموية' في تطبيق 'صحتي'."
