# CoreMotion configuration
# ------------------------------
# This file controls the UI text and a few visual preferences for the CoreMotion cards.
# You can safely change the text values without touching the app code.
#
# FORMAT
# - All strings are localized. Every text key contains language codes:
#   'en' for English, 'pt' for Portuguese. You may add more languages (e.g., 'es', 'fr').
# - Keep the structure flat (no deep nesting) to make it easy to edit.
#
# IMPORTANT
# - Do not remove required keys; if you don’t need a language, keep at least one (e.g., 'en').
# - Values on the right of the colon are the visible text in the app.
# - Lines starting with '#' are comments and ignored by the app.
#
# Version of this YAML schema/content. Bump when you change copy/structure.
version: "2.0.0"

# ========= Sampling / Timing =========
# Accelerometer sampling rate (Hz) -> interval = 1/Hz
accelerometerHz: 50
# Gyroscope sampling rate (Hz)
gyroscopeHz: 50
# Device Motion sampling rate (Hz) for Balance
deviceMotionHz: 50
# Balance test duration (seconds)
balanceDurationSeconds: 20
# Balance UI refresh/timer step (seconds)
balanceTimerStepSeconds: 0.025
# Cadence UI refresh/timer step (seconds)
cadenceTimerStepSeconds: 0.5

# ========= GPS =========
# Location accuracy: one of [best, bestForNavigation, tenMeters, hundredMeters, kilometer, threeKilometers]
gpsDesiredAccuracy: "best"
# Ignore small movements under this threshold (meters)
gpsDistanceFilterMeters: 5

# ========= Formatting (decimals) =========
# Decimal places for accelerometer numbers (g)
accelerometerDecimals: 2
# Decimal places for gyroscope numbers (degrees/sec)
gyroscopeDecimals: 0
# Decimal places for GPS speed numbers
speedDecimals: 1
# Decimal places for altitude numbers
altitudeDecimals: 0
# Decimal places for distance numbers
distanceDecimals: 0

# ========= Units (simple conversion/labels) =========
# Convert m/s to chosen speed unit using factor. km/h = 3.6, mph = 2.23694
speedUnitFactorFromMps: 3.6
speedUnitSymbol: "km/h"
# Distance unit symbol when displaying GPS distance
distanceUnitSymbol: "m"
# Altitude unit symbol
altitudeUnitSymbol: "m"

# ========= Localized titles (fallbacks used when CareKit task has no title/instructions) =========
