# This YAML contains a single ResearchKit task definition exported for the UI lab.
# Keep this file minimal: only a small comment header and the `version` + `task` payload.
# - Do NOT remove the `version` key (used by our versioned loader)
# - Keep the `task:` payload structure identical to the original combined file
# - Strings should remain localized where present (e.g., `en`, `pt`)
#
# Version of this YAML schema/content. Bump when you change copy/structure.
version: "2.0.0"

task:
  orderedTask:
    identifier: "scaleQuestionTask"
    steps:
      - question:
          identifier: "discreteScaleQuestionStep"
          title:
            en: "Scale"
            pt: "Escala"
          question:
            en: "Your question goes here."
            pt: "A sua pergunta vai aqui."
          text:
            en: "Discrete Scale"
            pt: "Escala Discreta"
          answer:
            scale:
              maxValue: 10
              minValue: 1
              defaultValue: 9223372036854775807
              step: 1
              vertical: false
              maximumValueDescription:
                en: "High Value"
                pt: "Valor Alto"
              minimumValueDescription:
                en: "Low Value"
                pt: "Valor Baixo"
      - question:
          identifier: "continuousScaleQuestionStep"
          title:
            en: "Scale"
            pt: "Escala"
          question:
            en: "Your question goes here."
            pt: "A sua pergunta vai aqui."
          text:
            en: "Continuous Scale"
            pt: "Escala Contínua"
          answer:
            continuousScale:
              maxValue: 1.0
              minValue: 0.0
              defaultValue: 99.0
              maximumFractionDigits: 0
              vertical: false
              maximumValueDescription: null
              minimumValueDescription: null
              isPercent: true
      - question:
          identifier: "discreteVerticalScaleQuestionStep"
          title:
            en: "Scale"
            pt: "Escala"
          question:
            en: "Your question goes here."
            pt: "A sua pergunta vai aqui."
          text:
            en: "Discrete Vertical Scale"
            pt: "Escala Discreta Vertical"
          answer:
            scale:
              maxValue: 10
              minValue: 1
              defaultValue: 9223372036854775807
              step: 1
              vertical: true
              maximumValueDescription: null
              minimumValueDescription: null
      - question:
          identifier: "continuousVerticalScaleQuestionStep"
          title:
            en: "Scale"
            pt: "Escala"
          question:
            en: "Your question goes here."
            pt: "A sua pergunta vai aqui."
          text:
            en: "Continuous Vertical Scale"
            pt: "Escala Contínua Vertical"
          answer:
            continuousScale:
              maxValue: 5.0
              minValue: 1.0
              defaultValue: 99.0
              maximumFractionDigits: 2
              vertical: true
              maximumValueDescription:
                en: "High Value"
                pt: "Valor Alto"
              minimumValueDescription:
                en: "Low Value"
                pt: "Valor Baixo"
              isPercent: false
      - question:
          identifier: "textScaleQuestionStep"
          title:
            en: "Scale"
            pt: "Escala"
          question:
            en: "Your question goes here."
            pt: "A sua pergunta vai aqui."
          text:
            en: "Text Scale"
            pt: "Escala de Texto"
          answer:
            textScale:
              textChoices:
                - en: "Poor"
                  pt: "Fraco"
                - en: "Fair"
                  pt: "Razoável"
                - en: "Good"
                  pt: "Bom"
                - en: "Above Average"
                  pt: "Acima da Média"
                - en: "Excellent"
                  pt: "Excelente"
              defaultIndex: 9223372036854775807
              vertical: false
      - question:
          identifier: "textVerticalScaleQuestionStep"
          title:
            en: "Scale"
            pt: "Escala"
          question:
            en: "Your question goes here."
            pt: "A sua pergunta vai aqui."
          text:
            en: "Text Vertical Scale"
            pt: "Escala de Texto Vertical"
          answer:
            textScale:
              textChoices:
                - en: "Poor"
                  pt: "Fraco"
                - en: "Fair"
                  pt: "Razoável"
                - en: "Good"
                  pt: "Bom"
                - en: "Above Average"
                  pt: "Acima da Média"
                - en: "Excellent"
                  pt: "Excelente"
              defaultIndex: 9223372036854775807
              vertical: true
