        configFileName: "two_finger_tapping"
      - title:
          en: "Walk Back and Forth"
          pt: "Caminhar para a Frente e para Trás"
          ar: "مشي ذهابًا وإيابًا"
        configFileName: "walk_back_and_forth"
      - title:
          en: "Tremor Test"
          pt: "Teste de Tremor"
          ar: "اختبار الرعاش"
