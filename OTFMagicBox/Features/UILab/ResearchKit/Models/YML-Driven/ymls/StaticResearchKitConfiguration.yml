          pt: "Sensibilidade ao Contraste (Landolt C)"
          ar: "حساسية التباين (Landolt C)"
        configFileName: "contrast_sensitivity_landolt_c"
  - title:
      en: "Consent & Account Tasks"
      pt: "Tarefas de Consentimento e Conta"
      ar: "مهام الموافقة والحساب"
