version: "2.0.0"  # Configuration schema version. Used by OTFVersionedDecodable for migration/compatibility.

sections:
  # A section groups multiple tasks under a localized heading in the UI.
  - title:
      en: "Survey Questions"
      pt: "Perguntas do Questionário"
      ar: "أسئلة الاستبيان"
    tasks:
      # Each task card shown under the section. Title is shown in the list; payload defines behavior.
      - title:
          en: "Question Task"
          pt: "Tarefa de Perguntas"
          ar: "مهمة الأسئلة"
        configFileName: "question_task"
      - title:
          en: "Survey Task"
          pt: "Tarefa de Inquérito"
          ar: "مهمة الاستقصاء"
        configFileName: "survey_task"
      - title:
          en: "Boolean Question"
          pt: "Pergunta Booleana"
          ar: "سؤال منطقي"
        configFileName: "boolean_question"
      - title:
          en: "Custom Boolean Question"
          pt: "Pergunta Booleana Personalizada"
          ar: "سؤال منطقي مخصص"
        configFileName: "custom_boolean_question"
      - title:
          en: "Date Question"
          pt: "Pergunta de Data"
          ar: "سؤال التاريخ"
        configFileName: "date_question"
      - title:
          en: "Date & Time Question"
          pt: "Pergunta de Data e Hora"
          ar: "سؤال التاريخ والوقت"
        configFileName: "date_time_question"
      - title:
          en: "Numeric Question"
          pt: "Pergunta Numérica"
          ar: "سؤال رقمي"
        configFileName: "numeric_question"
      - title:
          en: "Scale Question"
          pt: "Pergunta de Escala"
          ar: "سؤال المقياس"
        configFileName: "scale_question"
      - title:
          en: "Text Question"
          pt: "Pergunta de Texto"
          ar: "سؤال نصي"
        configFileName: "text_question"
      - title:
          en: "Text Choice Question"
          pt: "Pergunta de Escolha de Texto"
          ar: "سؤال اختيار النص"
        configFileName: "text_choice_question"
      - title:
          en: "Validated Text Question"
          pt: "Pergunta de Texto Validado"
          ar: "سؤال نصي مدقق"
        configFileName: "validated_text_question"
      - title:
          en: "Value Picker Question"
          pt: "Pergunta com Selecionador de Valores"
          ar: "سؤال منتقي القيم"
        configFileName: "value_picker_question"
      - title:
          en: "Location Question"
          pt: "Pergunta de Localização"
          ar: "سؤال الموقع"
        configFileName: "location_question"
      - title:
          en: "Time Interval Question"
          pt: "Pergunta de Intervalo de Tempo"
          ar: "سؤال الفاصل الزمني"
        configFileName: "time_interval_question"
      - title:
          en: "Time of Day Question"
          pt: "Pergunta de Hora do Dia"
          ar: "سؤال وقت اليوم"
        configFileName: "time_of_day_question"
  # Form Tasks
  - title:
      en: "Form Tasks"
      pt: "Tarefas de Formulário"
      ar: "مهام النماذج"
    tasks:
      - title:
          en: "Form Task"
          pt: "Tarefa de Formulário"
          ar: "مهمة النموذج"
        configFileName: "form_task"
      - title:
          en: "Grouped Form Task"
          pt: "Tarefa de Formulário Agrupado"
          ar: "مهمة النموذج المجمع"
        configFileName: "grouped_form_task"
