      - title:
          en: "Timed Walk (with Turn Around)"
          pt: "Caminhada Temporizada (com Retorno)"
          ar: "مشي مؤقت (مع الدوران)"
        configFileName: "timed_walk_with_turn_around"
      - title:
          en: "Tone Audiometry"
          pt: "Audiometria Tonal"
