# This YAML contains a single ResearchKit task definition exported for the UI lab.
# Keep this file minimal: only a small comment header and the `version` + `task` payload.
# - Do NOT remove the `version` key (used by our versioned loader)
# - Keep the `task:` payload structure identical to the original combined file
# - Strings should remain localized where present (e.g., `en`, `pt`)
#
# Version of this YAML schema/content. Bump when you change copy/structure.
version: "2.0.0"

task:
  navigableOrderedTask:
    identifier: "eligibilityTask"
    steps:
      - instruction:
          identifier: "eligibilityIntroStep"
          title:
            en: "Eligibility Task"
            pt: "Tarefa de Elegibilidade"
          text:
            en: "Please use this space to provide instructions for participants."
            pt: "Utilize este espaço para fornecer instruções aos participantes."
          detailText:
            en: "Please make sure to provide enough information so that users can progress through the survey and complete with ease."
            pt: "Certifique-se de fornecer informação suficiente para que os utilizadores possam avançar no inquérito e concluí-lo com facilidade."
      - form:
          identifier: "eligibilityFormStep"
          title:
            en: "Eligibility"
            pt: "Elegibilidade"
          text:
            en: "Eligibility"
            pt: "Elegibilidade"
          optional: false
          items:
            - identifier: "eligibilityFormItem01"
              text:
                en: "Your question goes here."
                pt: "A sua pergunta vai aqui."
              optional: false
              answer:
                textChoiceAnswer:
                  style: "single"
                  textChoices:
                    - en: "Yes"
                      pt: "Sim"
                    - en: "No"
                      pt: "Não"
                    - en: "N/A"
                      pt: "N/A"
            - identifier: "eligibilityFormItem02"
              text:
                en: "Your question goes here."
                pt: "A sua pergunta vai aqui."
              optional: false
              answer:
                textChoiceAnswer:
                  style: "single"
                  textChoices:
                    - en: "Yes"
                      pt: "Sim"
                    - en: "No"
                      pt: "Não"
                    - en: "N/A"
                      pt: "N/A"
            - identifier: "eligibilityFormItem03"
              text:
                en: "Your question goes here."
                pt: "A sua pergunta vai aqui."
              optional: false
              answer:
                textChoiceAnswer:
                  style: "single"
                  textChoices:
                    - en: "Yes"
                      pt: "Sim"
                    - en: "No"
                      pt: "Não"
                    - en: "N/A"
                      pt: "N/A"
      - instruction:
          identifier: "eligibilityIneligibleStep"
          title:
            en: "Eligibility Result"
            pt: "Resultado de Elegibilidade"
          text:
            en: "Eligibility Result"
            pt: "Resultado de Elegibilidade"
          detailText:
            en: "You are ineligible to join the study"
            pt: "Não é elegível para participar no estudo"
      - completion:
          identifier: "eligibilityEligibleStep"
          title:
            en: "Eligibility Result"
            pt: "Resultado de Elegibilidade"
          detailText:
            en: "You are eligible to join the study"
            pt: "É elegível para participar no estudo"
