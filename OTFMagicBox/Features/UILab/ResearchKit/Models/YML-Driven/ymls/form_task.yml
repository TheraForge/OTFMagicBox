# This YAML contains a single ResearchKit task definition exported for the UI lab.
# Keep this file minimal: only a small comment header and the `version` + `task` payload.
# - Do NOT remove the `version` key (used by our versioned loader)
# - Keep the `task:` payload structure identical to the original combined file
# - Strings should remain localized where present (e.g., `en`, `pt`)
#
# Version of this YAML schema/content. Bump when you change copy/structure.
version: "2.0.0"

task:
  orderedTask:
    identifier: "formTask"
    steps:
      - form:
          identifier: "formStep"
          title:
            en: "Form Step"
            pt: "Etapa de Formulário"
          text:
            en: "Additional text can go here."
            pt: "Texto adicional pode ser colocado aqui."
          items:
            - identifier: "appleFormItemIdentifier"
              text:
                en: "Which is your favorite apple?"
                pt: "Qual é a sua maçã favorita?"
              detailText: null
              placeholder: null
              tagText: null
              showsProgress: null
              optional: null
              learnMore: null
              answer:
                textChoiceAnswer:
                  style: "single"
                  textChoices:
                    - en: "Granny Smith"
                      pt: "Granny Smith"
                    - en: "Honeycrisp"
                      pt: "Honeycrisp"
                    - en: "Fuji"
                      pt: "Fuji"
                    - en: "McIntosh"
                      pt: "McIntosh"
                    - en: "Kanzi"
                      pt: "Kanzi"
            - identifier: "formItem03"
              text:
                en: "Your question goes here."
                pt: "A sua pergunta vai aqui."
              detailText: null
              placeholder: null
              tagText: null
              showsProgress: null
              optional: null
              learnMore: null
              answer:
                scale:
                  maxValue: 10
                  minValue: 0
                  defaultValue: 0
                  step: 1
                  vertical: false
                  maximumValueDescription: null
                  minimumValueDescription: null
            - identifier: "formItem04"
              text:
                en: "Your question goes here."
                pt: "A sua pergunta vai aqui."
              detailText: null
              placeholder: null
              tagText: null
              showsProgress: null
              optional: null
              learnMore: null
              answer:
                textScale:
                  textChoices:
                    - en: "choice 1"
                      pt: "opção 1"
                    - en: "choice 2"
                      pt: "opção 2"
                    - en: "choice 3"
                      pt: "opção 3"
                    - en: "choice 4"
                      pt: "opção 4"
                    - en: "choice 5"
                      pt: "opção 5"
                    - en: "choice 6"
                      pt: "opção 6"
                  defaultIndex: 10
                  vertical: false
            - identifier: "formItem01"
              text:
                en: "Field01"
                pt: "Campo01"
              detailText: null
              placeholder:
                en: "Your placeholder here"
                pt: "O seu texto de exemplo aqui"
              tagText: null
              showsProgress: null
              optional: null
              learnMore: null
              answer:
                integer:
                  unit: null
            - identifier: "formItem02"
              text:
                en: "Field02"
                pt: "Campo02"
              detailText: null
              placeholder:
                en: "Your placeholder here"
                pt: "O seu texto de exemplo aqui"
              tagText: null
              showsProgress: null
              optional: null
              learnMore: null
              answer:
                timeInterval: {}
      - completion:
          identifier: "CompletionStep"
          title:
            en: "All Done!"
            pt: "Concluído!"
          detailText:
            en: "You have completed the questionnaire."
            pt: "Concluiu o questionário."
