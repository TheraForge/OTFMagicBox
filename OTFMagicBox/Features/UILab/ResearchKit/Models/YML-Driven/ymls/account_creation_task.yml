# This YAML contains a single ResearchKit task definition exported for the UI lab.
# Keep this file minimal: only a small comment header and the `version` + `task` payload.
# - Do NOT remove the `version` key (used by our versioned loader)
# - Keep the `task:` payload structure identical to the original combined file
# - Strings should remain localized where present (e.g., `en`, `pt`)
#
# Version of this YAML schema/content. Bump when you change copy/structure.
version: "2.0.0"

task:
  orderedTask:
    identifier: "accountCreationTask"
    steps:
      - registration:
          identifier: "registrationStep"
          title:
            en: "Registration"
            pt: "Registo"
            ar: "التسجيل"
          text:
            en: "Please enter your details to create an account."
            pt: "Introduza os seus dados para criar uma conta."
            ar: "يرجى إدخال بياناتك لإنشاء حساب."
          passcodeValidationRegex: "^(?=.*\\d).{4,8}$"
          passcodeInvalidMessage:
            en: "A valid password must be 4 to 8 characters long and include at least one numeric character."
            pt: "Uma palavra-passe válida deve ter entre 4 e 8 caracteres e incluir pelo menos um algarismo."
            ar: "يجب أن تتراوح كلمة المرور الصالحة بين 4 إلى 8 أحرف وتتضمن حرفًا رقميًا واحدًا على الأقل."
          phoneValidationRegex: "^[+]{1,1}[1]{1,1}\\s{1,1}[(]{1,1}[1-9]{3,3}[)]{1,1}\\s{1,1}[1-9]{3,3}\\s{1,1}[1-9]{4,4}$"
          phoneInvalidMessage:
            en: "Expected format +1 (555) 5555 5555"
            pt: "Formato esperado +1 (555) 5555 5555"
            ar: "التنسيق المتوقع +1 (555) 5555 5555"
          options:
            - "givenName"
            - "familyName"
            - "gender"
            - "dob"
            - "phoneNumber"
      - wait:
          identifier: "waitStep"
          title:
            en: "Creating account"
            pt: "A criar conta"
            ar: "جارٍ إنشاء الحساب"
          text:
            en: "Please wait while we upload your data"
            pt: "Aguarde enquanto carregamos os seus dados"
            ar: "يرجى الانتظار بينما نقوم برفع بياناتك"
          indicator: progressBar
      - verification:
          identifier: "verificationStep"
          title:
            en: "Verify Your Email"
            pt: "Verifique o seu e-mail"
            ar: "تحقق من بريدك الإلكتروني"
          text:
            en: "We have sent a verification link to your email. Please follow the link to continue."
            pt: "Enviámos um link de verificação para o seu e-mail. Siga o link para continuar."
            ar: "لقد أرسلنا رابط تحقق إلى بريدك الإلكتروني. يرجى اتباع الرابط للمتابعة."
