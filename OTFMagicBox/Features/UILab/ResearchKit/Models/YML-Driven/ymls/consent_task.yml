# This YAML contains a single ResearchKit task definition exported for the UI lab.
# Keep this file minimal: only a small comment header and the `version` + `task` payload.
# - Do NOT remove the `version` key (used by our versioned loader)
# - Keep the `task:` payload structure identical to the original combined file
# - Strings should remain localized where present (e.g., `en`, `pt`)
#
# Version of this YAML schema/content. Bump when you change copy/structure.
version: "2.0.0"

task:
  orderedTask:
    identifier: "consentTask"
    steps:
      - visualConsent:
          identifier: "visualConsentStep"
          documentTitle:
            en: "Example Consent"
            pt: "Consentimento de Exemplo"
            ar: "نموذج الموافقة"
          signaturePageTitle:
            en: "Consent"
            pt: "Consentimento"
            ar: "الموافقة"
          signaturePageContent:
            en: "I agree to participate in this research study."
            pt: "Concordo em participar neste estudo de investigação."
            ar: "أوافق على المشاركة في هذه الدراسة البحثية."
          sectionTitle:
            en: "Welcome"
            pt: "Bem-vindo"
            ar: "أهلاً بك"
          sectionSummary:
            en: "This study will explain how we collect and use your data."
            pt: "Este estudo explica como recolhemos e usamos os seus dados."
            ar: "ستشرح هذه الدراسة كيفية جمع واستخدام بياناتك."
          sectionHTMLContent:
            en: "<p>Please read the following information carefully.</p>"
            pt: "<p>Por favor, leia atentamente a informação seguinte.</p>"
            ar: "<p>يرجى قراءة المعلومات التالية بعناية.</p>"
      - consentSharing:
          identifier: "consentSharingStep"
          investigatorShortDescription:
            en: "Institution"
            pt: "Instituição"
            ar: "المؤسسة"
          investigatorLongDescription:
            en: "Institution and its partners"
            pt: "A instituição e os seus parceiros"
            ar: "المؤسسة وشركاؤها"
          learnMoreHTML:
            en: "Your sharing learn more content here."
            pt: "O conteúdo de 'saiba mais' sobre partilha vai aqui."
            ar: "محتوى 'تعرف على المزيد' حول المشاركة يوضع هنا."
      - consentReview:
          identifier: "consentReviewStep"
          title:
            en: "Consent Document"
            pt: "Documento de Consentimento"
            ar: "وثيقة الموافقة"
          text:
            en: "Please review the consent document and sign to proceed."
            pt: "Revise o documento de consentimento e assine para continuar."
            ar: "يرجى مراجعة وثيقة الموافقة والتوقيع للمتابعة."
          reasonForConsent:
            en: "I agree to participate in this research study."
            pt: "Concordo em participar neste estudo de investigação."
            ar: "أوافق على المشاركة في هذه الدراسة البحثية."
          requiresScrollToBottom: true
          documentTitle:
            en: "Example Consent"
            pt: "Consentimento de Exemplo"
            ar: "نموذج الموافقة"
          signaturePageTitle:
            en: "Consent"
            pt: "Consentimento"
            ar: "الموافقة"
          signaturePageContent:
            en: "I agree to participate in this research study."
            pt: "Concordo em participar neste estudo de investigação."
            ar: "أوافق على المشاركة في هذه الدراسة البحثية."
          participantTitle:
            en: "Participant"
            pt: "Participante"
            ar: "المشارك"
          participantSignatureIdentifier: "consentDocumentParticipantSignature"
