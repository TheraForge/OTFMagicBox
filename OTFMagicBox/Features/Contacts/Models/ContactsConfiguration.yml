# Contacts feature configuration
# ------------------------------
# This file controls the UI text and a few visual preferences for the Contacts screen.
# You can safely change the text values without touching the app code.
#
# FORMAT
# - All strings are localized. Every text key contains language codes:
#   'en' for English, 'pt' for Portuguese. You may add more languages (e.g., 'es', 'fr').
# - Keep the structure flat (no deep nesting) to make it easy to edit.
#
# IMPORTANT
# - Do not remove required keys; if you don’t need a language, keep at least one (e.g., 'en').
# - Values on the right of the colon are the visible text in the app.
# - Lines starting with '#' are comments and ignored by the app.
#
# Version of this YAML schema/content. Bump when you change copy/structure.
version: "2.0.0"

# Navigation bar title on the Contacts screen.
navTitle:
  en: "Contacts"
  pt: "Contato"
  ar: "جهات الاتصال"

# Title in the empty state shown when there are no contacts to display.
emptyTitle:
  en: "No contacts yet"
  pt: "Ainda não há contatos"
  ar: "لا توجد جهات اتصال بعد"

# Description under the empty title to guide the user.
emptyDescription:
  en: "Your care team will appear here once added."
  pt: "Sua equipe aparecerá aqui quando for adicionada."
  ar: "سيظهر فريق الرعاية الخاص بك هنا بمجرد إضافته."

# SF Symbol name used in the empty state illustration.
# Tip: Use a valid SF Symbols identifier (e.g., "person.3", "person.crop.circle.badge.plus").
emptySymbol: "person.3"

# Alert title shown after the account is deleted (the app navigates back to onboarding).
deletedAlertTitle:
  en: "Account Deleted"
  pt: "Conta Excluída"
  ar: "تم حذف الحساب"

# Alert explanatory message for the deleted account flow.
deletedAlertMessage:
  en: "Your account was deleted. You'll be returned to onboarding."
  pt: "Sua conta foi excluída. Você será levado ao onboarding."
  ar: "تم حذف حسابك. ستتم إعادتك إلى شاشة الإعداد."

# Default confirmation action title.
okayActionTitle:
  en: "OK"
  pt: "OK"
  ar: "موافق"
